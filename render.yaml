# =============================================================================
# render.yaml — Blueprint para deploy no Render.com (GRATUITO)
# Um clique para subir a aplicação + banco PostgreSQL
# Docs: https://docs.render.com/blueprint-spec
# =============================================================================

services:
  - type: web
    name: acaiteria-crm
    runtime: docker
    repo: https://github.com/MauroSalles/acaiteria-crm
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: acaiteria-db
          property: connectionString
      - key: SECRET_KEY
        sync: false    # IMPORTANTE: definir valor fixo no dashboard Render
                       # generateValue regenera a cada redeploy → invalida sessões
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
      - key: PIX_CHAVE
        sync: false    # configurar manualmente no dashboard
      - key: ADMIN_SENHA
        generateValue: true

databases:
  - name: acaiteria-db
    plan: free
    databaseName: acaiteria_crm
    user: acaiteria
    region: oregon
