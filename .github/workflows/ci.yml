# =============================================================================
# CI/CD — AcaiteriaCRM (Grupo 22 - UNIVESP 2026)
# Roda testes, linter e cobertura automaticamente a cada push/PR
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov flake8

      - name: Lint com flake8
        run: flake8 backend/ --max-line-length=120 --statistics

      - name: Testes com cobertura
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key"
          FLASK_ENV: "testing"
        run: |
          pytest tests/ -v --tb=short --cov=backend --cov-report=term-missing --cov-report=xml

      - name: Upload cobertura para Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
