<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro interno - Açaiteria CRM</title>
    <link rel="stylesheet" href="/static/estilos.css">
    <meta name="theme-color" content="#7B1FA2">
    <style>
        .error-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem}
        .error-icon{font-size:6rem;margin-bottom:1rem;animation:pulse 2s ease-in-out infinite}
        .error-code{font-size:5rem;font-weight:800;color:var(--vermelho);margin:0;line-height:1}
        .error-msg{font-size:1.3rem;color:var(--cinza-600);margin:1rem 0 2rem}
        .error-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="navbar-brand">🍇 <strong>Combina Açaí</strong></div>
        </nav>
        <main class="content">
            <div class="error-page">
                <div class="error-icon">⚠️</div>
                <h1 class="error-code">500</h1>
                <p class="error-msg">Erro interno do servidor.<br>Nossa máquina de açaí está em manutenção — tente novamente em instantes.</p>
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">🏠 Voltar ao Início</a>
                    <a href="javascript:location.reload()" class="btn btn-warning">🔄 Tentar Novamente</a>
                </div>
            </div>
        </main>
        <footer class="footer">
            <p>&copy; 2026 - Projeto Integrador UNIVESP | Grupo 22 | Polo Lorena/SP</p>
        </footer>
    </div>
</body>
</html>
