<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Açaiteria CRM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#7B1FA2">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-card {
            background: var(--branco);
            border-radius: var(--raio);
            box-shadow: var(--sombra-lg);
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .login-card h1 {
            color: var(--acai);
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        .login-card .subtitle {
            color: var(--cinza-600);
            margin-bottom: 2rem;
        }
        .login-card .emoji-logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }
        .login-input {
            font-size: 1rem;
            padding: 0.9rem 1rem;
            border: 2px solid var(--cinza-300);
            border-radius: var(--raio-sm);
            width: 100%;
            margin-bottom: 1rem;
            transition: border-color var(--fast);
        }
        .login-input:focus {
            outline: none;
            border-color: var(--acai);
            box-shadow: 0 0 0 3px rgba(108, 46, 185, 0.15);
        }
        .login-erro {
            color: var(--vermelho);
            background: #FFEBEE;
            padding: 0.8rem;
            border-radius: var(--raio-sm);
            margin-bottom: 1rem;
        }
        .login-label {
            text-align: left;
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: var(--cinza-700, #555);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-card">
                <span class="emoji-logo">🍇</span>
                <h1>Açaiteria CRM</h1>
                <p class="subtitle">Combina Açaí — Sistema de Gestão</p>

                {% if erro %}
                <div class="login-erro">⚠️ {{ erro }}</div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="form-group">
                        <label for="email" class="login-label">📧 Email:</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="login-input" 
                            required 
                            autofocus
                            autocomplete="email"
                            placeholder="seu@email.com"
                        >
                    </div>
                    <div class="form-group">
                        <label for="senha" class="login-label">🔒 Senha:</label>
                        <input 
                            type="password" 
                            id="senha" 
                            name="senha" 
                            class="login-input" 
                            required 
                            autocomplete="current-password"
                            placeholder="••••••••"
                        >
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                        🔓 Entrar
                    </button>
                </form>

                <p style="margin-top: 2rem; font-size: 0.85rem; color: var(--cinza-600);">
                    Projeto Integrador UNIVESP — Grupo 22
                </p>
            </div>
        </div>

        <footer class="footer">
            <p>© 2026 - Projeto Integrador UNIVESP | Grupo 22 | Polo Lorena/SP</p>
        </footer>
    </div>
</body>
</html>
