# =============================================================================
# docker-compose.yml — AcaiteriaCRM (Configurado com Admin e PIX)
# =============================================================================

services:
  # ---------- Banco de dados PostgreSQL ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - acaiteria_net
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Aplicação Flask ----------
  web:
    build: .
    restart: unless-stopped
    networks:
      - acaiteria_net
    ports:
      - "${FLASK_PORT}:${INTERNAL_PORT}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - PORT=${INTERNAL_PORT}
      - FLASK_ENV=${FLASK_ENV}
      # --- NOVAS VARIÁVEIS MAPEADAS ---
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_SENHA=${ADMIN_SENHA}
      - PIX_CHAVE=${PIX_CHAVE}
    depends_on:
      db:
        condition: service_healthy

networks:
  acaiteria_net:
    driver: bridge

volumes:
  pgdata: